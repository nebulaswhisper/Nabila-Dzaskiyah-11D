<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Testimonial form - Nebula Book Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.ico" type="image/x-icon">
    </head>
<body>
    <header>
        <h1>tholabuleilm.side</h1>
    <nav> 
         <a href="index.html" class="nav-btn">Beranda</a> 
        <a href="produk.html" class="nav-btn">Produk</a>
        <a href="bedah-buku.html" class="nav-btn">Bedah Buku</a>
        <a href="testimoni.html" class="nav-btn active" aria-current="page">Testimoni</a>
        <a href="tampil-testimoni.html" class="nav-btn">Testimoni Pembeli</a>
            <a href="event.html" class="nav-btn" >Event</a>
            <a href="kontak.html" class="nav-btn">Kontak</a>
    </nav>
    </header>
<h2>Formulir Testimoni</h2>
<div class="testimonial-form">
    <form id="formTestimoni" action="submit-testimonial.html" method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required placeholder="Enter your name">

        <label for="asal">Origin of School / Agency / Community:</label>
        <input type="text" id="asal" name="asal" required placeholder="Enter your school, agency, or community">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">

        <label for="judul buku yang dibeli">Title of Book Purchased:</label>
        <input type="text" id="judul buku yang dibeli" name="judul buku yang dibeli" required placeholder="Enter the title of the book you purchased">

        <label for="message">Your Testimony:</label>
        <textarea id="message" name="message" rows="5" required placeholder="Write your experience..."></textarea>

        <label for="rating">Rating (1-5):</label>
        <input type="number" id="rating" name="rating" min="1" max="5" required placeholder="Enter your rating from 1 to 5">

        <button type="submit">Submit</button>
    </form>
</div>
<footer>
    <p>&copy; 2025 tholabuleilm.side. All rights reserved.</p>
</footer>
<script>
    document.getElementById('formTestimoni').addEventListener('submit', function(event) {
        event.preventDefault();

        const nama = document.getElementById('name').value;
        const asal = document.getElementById('asal').value;
        const email = document.getElementById('email').value;
        const judulBuku = document.getElementById('judul buku yang dibeli').value;
        const ulasan = document.getElementById('message').value;
        const rating = document.getElementById('rating').value;

        const dataBaru = { nama, asal, email, judulBuku, ulasan, rating };
        // Ambil data testimoni yang sudah ada dari localStorage
        const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];
        // Tambahkan testimoni baru ke dalam array
        testimoniList.push(dataBaru);
        // Simpan kembali ke localStorage
        localStorage.setItem('testimoniList', JSON.stringify(testimoniList));
        // Redirect ke halaman konfirmasi
        window.location.href = 'proses-testimoni.html';
    });
</script>
</body>
</html>
